<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Важный вопрос 💌</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe4e8 0%, #fce4ec 40%, #f8bbd9 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
      position: relative;
    }

    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart-particle {
      position: absolute;
      font-size: 20px;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-100vh) rotate(360deg); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      padding: 56px 64px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(200, 60, 100, 0.18);
      max-width: 480px;
      width: 90%;
      backdrop-filter: blur(4px);
    }

    .emoji-big {
      font-size: 64px;
      display: block;
      margin-bottom: 16px;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    /* subtitle NOW comes first visually */
    .subtitle {
      font-size: 15px;
      color: #999;
      font-style: italic;
      margin-bottom: 14px;
    }

    .title {
      font-size: 30px;
      font-weight: bold;
      color: #c2185b;
      margin-bottom: 36px;
      line-height: 1.3;
    }

    /* Button wrapper — static, inside the card */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }
    .buttons-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
    }

    .btn-yes {
      background: linear-gradient(135deg, #e91e8c, #c2185b);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 16px 44px;
      font-size: 18px;
      font-family: 'Georgia', serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 20px rgba(194, 24, 91, 0.35);
      flex-shrink: 0;
    }

    .btn-yes:hover {
      transform: scale(1.06);
      box-shadow: 0 10px 28px rgba(194, 24, 91, 0.45);
    }

    .btn-yes:active { transform: scale(0.97); }

    /* "No" button — fixed so it can roam, but clamped to viewport */
    .btn-no {
      background: white;
      color: #c2185b;
      border: 2px solid #f48fb1;
      border-radius: 50px;
      padding: 16px 44px;
      font-size: 18px;
      font-family: 'Georgia', serif;
      cursor: pointer;
      position: fixed;
      transition: left 0.18s ease, top 0.18s ease;
      z-index: 9999;
      white-space: nowrap;
    }

    /* placeholder so the card layout reserves space for "нет" */
    .btn-no-placeholder {
      display: inline-block;
      padding: 16px 44px;
      font-size: 18px;
      white-space: nowrap;
      visibility: hidden;
      flex-shrink: 0;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 24px;
      padding: 44px 48px;
      max-width: 440px;
      width: 92%;
      text-align: center;
      position: relative;
      box-shadow: 0 16px 50px rgba(0,0,0,0.2);
      animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #aaa;
      line-height: 1;
    }

    .modal-close:hover { color: #555; }

    .modal-title {
      font-size: 22px;
      color: #c2185b;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .modal-sub {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 28px;
      font-style: italic;
    }

    .form-group { margin-bottom: 18px; text-align: left; }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #f0c0d0;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Georgia', serif;
      color: #444;
      background: #fff9fb;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-group input:focus,
    .form-group select:focus { border-color: #e91e8c; }

    .select-wrap { position: relative; }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #c2185b;
      pointer-events: none;
      font-size: 16px;
    }

    .btn-confirm {
      width: 100%;
      margin-top: 10px;
      background: linear-gradient(135deg, #e91e8c, #c2185b);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 15px;
      font-size: 17px;
      font-family: 'Georgia', serif;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(194, 24, 91, 0.3);
      transition: transform 0.15s;
    }

    .btn-confirm:hover  { transform: scale(1.03); }
    .btn-confirm:active { transform: scale(0.97); }

    /* Success screen */
    .success-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #ffe4e8, #fce4ec);
      z-index: 200;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .success-screen.active { display: flex; }

    .success-box { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .success-emoji { font-size: 80px; display: block; margin-bottom: 20px; }

    .success-title {
      font-size: 32px;
      color: #c2185b;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .success-details { font-size: 17px; color: #888; line-height: 2; }
    .success-details span { color: #c2185b; font-weight: bold; }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="card">
    <span class="emoji-big">💌</span>

    <!-- subtitle first, title second -->
    <p class="subtitle">Один важный вопрос, который я давно хотел задать...</p>
    <h1 class="title">Пойдёшь на свидание со мной?</h1>

    <div class="buttons">
      <div class="buttons-row">
        <button class="btn-yes" onclick="openModal()">Да 💕</button>
        <!-- invisible placeholder keeps layout stable while real button roams -->
        <span class="btn-no-placeholder">Нет 🙈</span>
      </div>
      <button onclick="sendLove()" style="background:none;border:1.5px solid #f48fb1;border-radius:50px;font-size:14px;color:#c2185b;font-family:'Georgia',serif;cursor:pointer;font-style:italic;padding:10px 24px;">Пошел нахуй Максим Стешкин</button>
    </div>
  </div>

  <!-- The real "No" button — fixed, roams the screen -->
  <button class="btn-no" id="btnNo">Нет 🙈</button>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-title">🎉 Ура! Когда идём?</div>
      <p class="modal-sub">Выбери дату, время и место</p>

      <div class="form-group">
        <label>📅 Дата</label>
        <input type="date" id="dateInput" />
      </div>

      <div class="form-group">
        <label>🕐 Время</label>
        <input type="time" id="timeInput" value="19:00" />
      </div>

      <div class="form-group">
        <label>📍 Место</label>
        <div class="select-wrap">
          <select id="placeSelect">
            <option value="">— Выбери место —</option>
            <option>🍽️ Уютный ресторан</option>
            <option>🎬 Кино</option>
            <option>☕ Кофейня</option>
            <option>🌿 Прогулка в парке</option>
            <option>🎨 Музей или галерея</option>
            <option>🎭 Театр или концерт</option>
            <option>🍕 Пицца и домашний фильм</option>
            <option>🚤 Романтическая прогулка на лодке</option>
            <option>🎡 Парк развлечений</option>
            <option>🌅 Смотреть закат</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>&#x1F4AC; Комментарий (здесь можно послать меня)</label>
        <textarea id="commentInput" placeholder="Напиши что-нибудь..." rows="3" style="width:100%;padding:12px 16px;border:1.5px solid #f0c0d0;border-radius:12px;font-size:15px;font-family:'Georgia',serif;color:#444;background:#fff9fb;outline:none;transition:border-color 0.2s;resize:none;" onfocus="this.style.borderColor='#e91e8c'" onblur="this.style.borderColor='#f0c0d0'"></textarea>
      </div>

      <button class="btn-confirm" onclick="confirmDate()">Договорились! &#x1F496;</button>
    </div>
  </div>

  <!-- Success screen -->
  <div class="success-screen" id="successScreen">

      <h2 class="success-title">Не могу дождаться!</h2>
      <div class="success-details">
        <div>📅 <span id="resDate">—</span></div>
        <div>🕐 <span id="resTime">—</span></div>
        <div>📍 <span id="resPlace">—</span></div>
        <div id="commentBlock" style="margin-top:8px;font-size:15px;font-style:italic;"><span id="commentLabel"></span><span id="resComment" style="color:#c2185b;font-weight:bold;"></span></div>

  <script>
    /* ── Floating hearts ── */
    const bg = document.getElementById('heartsBg');
    const emojis = ['❤️','💕','💖','💗','💓','🌹','✨','💝'];

    function spawnHeart() {
      const el = document.createElement('span');
      el.className = 'heart-particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.bottom = '-40px';
      const dur = 6 + Math.random() * 6;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = Math.random() * 3 + 's';
      el.style.fontSize = (14 + Math.random() * 18) + 'px';
      bg.appendChild(el);
      setTimeout(() => el.remove(), (dur + 3) * 1000);
    }

    setInterval(spawnHeart, 600);
    for (let i = 0; i < 8; i++) spawnHeart();

    /* ── "No" button — positioned on top of placeholder, then runs away ── */
    const btnNo = document.getElementById('btnNo');
    const placeholder = document.querySelector('.btn-no-placeholder');
    let noX = 0, noY = 0, noReady = false;

    function syncNoToPlaceholder() {
      const r = placeholder.getBoundingClientRect();
      noX = r.left;
      noY = r.top;
      btnNo.style.left = noX + 'px';
      btnNo.style.top  = noY + 'px';
      noReady = true;
    }

    window.addEventListener('load', syncNoToPlaceholder);
    window.addEventListener('resize', () => { if (!noReady) syncNoToPlaceholder(); });

    btnNo.addEventListener('mouseenter', () => {
      if (!noReady) syncNoToPlaceholder();

      const bw = btnNo.offsetWidth;
      const bh = btnNo.offsetHeight;
      const margin = 16;
      const maxX = window.innerWidth  - bw  - margin;
      const maxY = window.innerHeight - bh  - margin;

      let newX, newY, tries = 0;
      do {
        newX = margin + Math.random() * (maxX - margin);
        newY = margin + Math.random() * (maxY - margin);
        tries++;
      } while (Math.abs(newX - noX) < 140 && Math.abs(newY - noY) < 80 && tries < 20);

      /* clamp strictly inside viewport */
      newX = Math.max(margin, Math.min(newX, maxX));
      newY = Math.max(margin, Math.min(newY, maxY));

      noX = newX;
      noY = newY;
      btnNo.style.left = noX + 'px';
      btnNo.style.top  = noY + 'px';
    });

    /* ── Modal ── */
    function openModal() {
      document.getElementById('modalOverlay').classList.add('active');
      btnNo.style.visibility = 'hidden';
      const today = new Date().toISOString().split('T')[0];
      const di = document.getElementById('dateInput');
      di.min = today;
      if (!di.value) di.value = today;
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      btnNo.style.visibility = 'visible';
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    /* ── Confirm & notify ── */
    function confirmDate() {
      const date  = document.getElementById('dateInput').value;
      const time  = document.getElementById('timeInput').value;
      const place = document.getElementById('placeSelect').value;

      if (!date || !time || !place) {
        alert('Пожалуйста, выбери дату, время и место 🥺');
        return;
      }

      const dateStr = new Date(date).toLocaleDateString('ru-RU', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
      const [h, m] = time.split(':');
      const timeStr = h + ':' + m;

      const comment = document.getElementById('commentInput').value.trim();

      document.getElementById('resDate').textContent  = dateStr;
      document.getElementById('resTime').textContent  = timeStr;
      document.getElementById('resPlace').textContent = place;
      if (comment) {
        document.getElementById('commentLabel').innerHTML = '💌 Ваш оставленный комментарий Максимке:<br>';
        document.getElementById('resComment').textContent = comment;
      } else {
        document.getElementById('commentLabel').textContent = '';
        document.getElementById('resComment').textContent = 'Я скучаю по тебе';
      }

      /* ── Telegram notification ──────────────────────────────────────────
         Замени значения ниже своими:
           TELEGRAM_BOT_TOKEN  — токен от @BotFather
